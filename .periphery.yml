project: App/Blurt/Blurt.xcodeproj
schemes:
  - Blurt
# Enforce that the engine exposes no `public` API the app doesn't actually use:
# periphery scans the app scheme, so any symbol that's public but only reached
# from within the engine (or only from tests via @testable) is flagged as
# redundant-public and fails --strict. Keep engine internals `internal`; tests
# see them through `@testable import`.
retain_public: false
# DictationLog.Entry's properties exist solely to be encoded by JSONEncoder;
# Periphery can't see Codable's reflective key emission.
retain_codable_properties: true
# AppCoordinator stores a Task<Void, Never> to keep the phase-stream observer
# alive for the lifetime of the coordinator — assignment IS the use.
retain_assign_only_property_types:
  - "Task<Void, Never>"
# The XCUITest bundle's test/helper methods are entry points invoked by the test
# runner, not from app code; exclude them from the unused-code scan so its
# helpers don't trip --strict.
index_exclude:
  - "App/Blurt/BlurtUITests/**"

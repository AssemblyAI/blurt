name: Feature request
description: Suggest an idea or improvement for Blurt
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Blurt aims to stay small and focused — see ["Things deliberately not here"](https://github.com/AssemblyAI/blurt/blob/main/AGENTS.md) for what's intentionally out of scope.
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: The problem you're hitting and the change you have in mind.
    validations:
      required: true

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-published CodeQL queries run against main even
    # during quiet periods. Monday 07:00 UTC.
    - cron: "0 7 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    permissions:
      security-events: write # upload SARIF results to code scanning
      actions: read # required to read workflow runs on private repos
      contents: read # checkout

    strategy:
      fail-fast: false
      matrix:
        include:
          # Scans the workflow files themselves for injection and other
          # GitHub Actions security issues. No build; runs on cheap Linux.
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          # The Swift engine + app. build-mode: manual mirrors check.sh so the
          # CodeQL tracer sees the same compiler invocations; autobuild can't
          # cope with the xcodegen step + disabled signing.
          - language: swift
            build-mode: manual
            runner: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Drive the Swift build explicitly (build-mode: manual) so the CodeQL
      # tracer sees the compiler invocations for the app + engine. We build the
      # committed Blurt.xcodeproj directly — no xcodegen step: the project is
      # checked in and drift-checked by the `check` workflow, so it's already in
      # sync with project.yml. (This also sidesteps CodeQL's Swift tracer running
      # the build under an x86_64/Rosetta process, which makes Homebrew reject
      # `brew install` in the arm64 /opt/homebrew prefix.) Codesigning is off: the
      # Developer ID cert only lives on the maintainer's machine, and the
      # "Install to /Applications" postBuildScript bails when signing is off.
      - name: Build Swift
        if: matrix.language == 'swift'
        working-directory: App/Blurt
        run: |
          # Generic destination ("Any Mac"), not arch=arm64: CodeQL's tracer runs
          # this build as an x86_64/Rosetta process, so xcodebuild sees the host
          # as x86_64 and can't match an arm64 device for our arm64-only project.
          # The generic destination cross-compiles per the project's ARCHS (arm64)
          # regardless of the host arch.
          xcodebuild \
            -project Blurt.xcodeproj \
            -scheme Blurt \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

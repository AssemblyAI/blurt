name: Bug report
description: Something in Blurt isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security issues, don't file a public issue — see [SECURITY.md](https://github.com/AssemblyAI/blurt/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, what you expected instead, and the steps to reproduce it.
      placeholder: |
        I held right ⌘ in Safari and spoke, but nothing was typed.
        I expected the cleaned-up text to be pasted into the focused field.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: macOS and Blurt versions
      placeholder: "macOS 26.1 · Blurt 1.0.0"
    validations:
      required: true
